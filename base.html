<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}মাদরাসা ERP{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --bg-sidebar-hover: #1e293b;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-sidebar: #e2e8f0;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-sidebar: #020617;
            --bg-sidebar-hover: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-sidebar: #cbd5e1;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
        }

        /* TOP NAV */
        .topbar {
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 998;
            backdrop-filter: blur(8px);
            background: color-mix(in srgb, var(--bg-secondary) 80%, transparent);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: transparent;
            color: var(--text-primary);
        }

        .menu-btn:hover {
            background: var(--bg-primary);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.125rem;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: transparent;
            color: var(--text-secondary);
        }

        .icon-btn:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 270px;
            height: 100dvh;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            transition: var(--transition);
            padding: 1.5rem 0;
            z-index: 999;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 1rem;
        }

        .sidebar-nav {
            padding: 0 0.75rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-sidebar);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.25rem;
            transition: var(--transition);
            font-weight: 500;
        }

        .nav-item:hover {
            background: var(--bg-sidebar-hover);
            color: white;
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        .nav-item i {
            width: 20px;
            height: 20px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 998;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            display: block;
            opacity: 1;
        }

        /* MAIN CONTENT */
        .content {
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* CARD */
        .card {
            background: var(--bg-secondary);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        /* BUTTONS */
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: var(--warning);
        }

        .btn-small {
            padding: 4px 12px;
            font-size: 12px;
        }

        /* FORM */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* TABLE */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        /* BADGE */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-paid { background: #d1fae5; color: #065f46; }
        .badge-pending { background: #fed7aa; color: #92400e; }

        /* FLEX */
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin-top: 8px;
        }

        /* DESKTOP */
        @media (min-width: 1024px) {
            .sidebar {
                left: 0;
            }
            .overlay {
                display: none !important;
            }
            .menu-btn {
                display: none;
            }
            .content {
                margin-left: 270px;
            }
            .topbar {
                margin-left: 270px;
            }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            th, td {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="topbar-left">
        <button class="menu-btn" onclick="toggleMenu()">
            <i data-lucide="menu"></i>
        </button>
        <div class="logo">
            <i data-lucide="graduation-cap"></i>
            <span>মাদরাসা ERP</span>
        </div>
    </div>
    
    <div class="topbar-right">
        <button class="icon-btn" onclick="toggleTheme()" title="থিম পরিবর্তন">
            <i data-lucide="sun" id="theme-icon"></i>
        </button>
        <button class="icon-btn" onclick="window.location.href='login.html'" title="লগআউট">
            <i data-lucide="log-out"></i>
        </button>
    </div>
</div>

<!-- SIDEBAR MENU -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <i data-lucide="graduation-cap"></i>
            <span>মাদরাসা ERP</span>
        </div>
    </div>
    
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item" id="nav-dashboard">
            <i data-lucide="layout-dashboard"></i>
            <span>ড্যাশবোর্ড</span>
        </a>
        <a href="student.html" class="nav-item" id="nav-students">
            <i data-lucide="users"></i>
            <span>ছাত্র তালিকা</span>
        </a>
        <a href="payment.html" class="nav-item" id="nav-payments">
            <i data-lucide="wallet"></i>
            <span>পেমেন্ট</span>
        </a>
        <a href="ledger.html" class="nav-item" id="nav-ledger">
            <i data-lucide="book-text"></i>
            <span>লেজার</span>
        </a>
        <a href="expenses.html" class="nav-item" id="nav-expenses">
            <i data-lucide="receipt"></i>
            <span>খরচ</span>
        </a>
        <a href="salary.html" class="nav-item" id="nav-salary">
            <i data-lucide="briefcase"></i>
            <span>বেতন</span>
        </a>
        <a href="teachers.html" class="nav-item" id="nav-teachers">
            <i data-lucide="user-check"></i>
            <span>শিক্ষক</span>
        </a>
        <a href="reports.html" class="nav-item" id="nav-reports">
            <i data-lucide="file-text"></i>
            <span>রিপোর্ট</span>
        </a>
    </nav>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- MAIN CONTENT -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<script>
    // Lucide Icons Init
    lucide.createIcons();

    // Sidebar Toggle
    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    // Theme Toggle + Save to localStorage
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        
        // Icon change
        const icon = document.getElementById('theme-icon');
        icon.setAttribute('data-lucide', newTheme === 'dark' ? 'moon' : 'sun');
        lucide.createIcons();
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-icon').setAttribute('data-lucide', savedTheme === 'dark' ? 'moon' : 'sun');
    
    // Close sidebar when clicking nav item on mobile
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            if (window.innerWidth < 1024) {
                toggleMenu();
            }
        });
    });

    // সক্রিয় মেনু হাইলাইট করা
    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.nav-item').forEach(item => {
        const href = item.getAttribute('href');
        if (href === currentPage) {
            item.classList.add('active');
        } else if (currentPage === '' || currentPage === 'login.html') {
            // লগইন পেইজে কোন মেনু active না
        } else {
            item.classList.remove('active');
        }
    });
</script>

</body>
</html>
