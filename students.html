<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ছাত্র ব্যবস্থাপনা - মাদরাসা ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --bg-sidebar-hover: #1e293b;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-sidebar: #e2e8f0;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --radius-card: 16px;
            --radius-element: 10px;
            --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-sidebar: #020617;
            --bg-sidebar-hover: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            font-size: 14px;
            line-height: 1.4;
        }

        /* ----- কমপ্যাক্ট টপবার ----- */
        .topbar {
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 998;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .menu-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }
        .menu-btn:hover {
            background: var(--bg-primary);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 700;
            font-size: 1rem;
        }
        .logo i {
            width: 18px;
            height: 18px;
        }
        .topbar-right {
            display: flex;
            gap: 0.5rem;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        .icon-btn:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ----- সাইডবার (প্রস্থ কম) ----- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -260px;
            width: 250px;
            height: 100dvh;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            transition: 0.2s;
            padding: 1rem 0;
            z-index: 999;
            overflow-y: auto;
        }
        .sidebar.active {
            left: 0;
        }
        .sidebar-header {
            padding: 0 1rem 1rem;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 0.75rem;
        }
        .sidebar-nav {
            padding: 0 0.5rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.6rem 0.8rem;
            color: var(--text-sidebar);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 0.2rem;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.85rem;
        }
        .nav-item i {
            width: 18px;
            height: 18px;
        }
        .nav-item:hover {
            background: var(--bg-sidebar-hover);
            color: white;
        }
        .nav-item.active {
            background: var(--accent);
            color: white;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            display: none;
            z-index: 998;
        }
        .overlay.active {
            display: block;
        }

        /* ----- কন্টেন্ট এলাকা (কম্প্যাক্ট) ----- */
        .content {
            padding: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .card {
            background: var(--bg-secondary);
            border-radius: var(--radius-card);
            border: 1px solid var(--border);
            padding: 1rem;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
        }
        .search-box {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-element);
            background: var(--bg-primary);
            font-size: 0.85rem;
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: var(--transition);
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-small {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .table-responsive {
            overflow-x: auto;
            margin-top: 0.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th, td {
            padding: 0.7rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        th {
            font-weight: 600;
            color: var(--text-secondary);
        }
        td button {
            margin-right: 0.3rem;
        }

        /* ----- মডাল (ছোট ও মার্জিত) ----- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 1.2rem;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .modal-content h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-element);
            background: var(--bg-primary);
            font-size: 0.85rem;
        }
        .form-group input[type="checkbox"] {
            width: auto;
            margin-right: 0.5rem;
        }
        .modal-footer {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-top: 1.2rem;
        }

        /* ----- রেস্পন্সিভ ----- */
        @media (min-width: 1024px) {
            .sidebar {
                left: 0;
            }
            .menu-btn {
                display: none;
            }
            .overlay {
                display: none !important;
            }
            .content {
                margin-left: 250px;
            }
            .topbar {
                margin-left: 250px;
            }
        }
        @media (max-width: 640px) {
            .content {
                padding: 0.75rem;
            }
            th, td {
                font-size: 0.75rem;
                padding: 0.5rem 0.3rem;
            }
            .btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
<div class="topbar">
    <div class="topbar-left">
        <button class="menu-btn" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
        <div class="logo"><i data-lucide="graduation-cap"></i><span>মাদরাসা ERP</span></div>
    </div>
    <div class="topbar-right">
        <button class="icon-btn" onclick="toggleTheme()"><i data-lucide="sun" id="theme-icon"></i></button>
        <button class="icon-btn" onclick="window.location.href='login.html'"><i data-lucide="log-out"></i></button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo"><i data-lucide="graduation-cap"></i><span>মাদরাসা ERP</span></div>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>ড্যাশবোর্ড</span></a>
        <a href="students.html" class="nav-item active"><i data-lucide="users"></i><span>ছাত্র তালিকা</span></a>
        <a href="payment.html" class="nav-item"><i data-lucide="wallet"></i><span>পেমেন্ট</span></a>
        <a href="due_list.html" class="nav-item"><i data-lucide="alert-circle"></i><span>বকেয়া ছাত্র</span></a>
        <a href="expenses.html" class="nav-item"><i data-lucide="receipt"></i><span>খরচ</span></a>
        <a href="reports.html" class="nav-item"><i data-lucide="bar-chart-2"></i><span>রিপোর্ট</span></a>
        <a href="inactive_students.html" class="nav-item"><i data-lucide="archive"></i><span>নিষ্ক্রিয় ছাত্র</span></a>
        <a href="settings.html" class="nav-item"><i data-lucide="settings"></i><span>সেটিংস</span></a>
    </nav>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="content">
    <div class="card">
        <div class="search-box">
            <input type="text" id="search" placeholder="নাম বা আইডি দ্বারা সার্চ..." onkeyup="filterStudents()">
            <button class="btn" onclick="openAddModal()"><i data-lucide="plus"></i> নতুন ছাত্র</button>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>আইডি</th><th>নাম</th><th>পিতা</th><th>মোবাইল</th><th>ক্লাস</th><th>আবাসিক</th><th>শুরুর মাস</th><th>অ্যাকশন</th></tr>
                </thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">নতুন ছাত্র</h3>
        <form id="studentForm">
            <input type="hidden" id="studentId">
            <div class="form-group"><label>নাম *</label><input type="text" id="name" required></div>
            <div class="form-group"><label>পিতার নাম</label><input type="text" id="father"></div>
            <div class="form-group"><label>মোবাইল</label><input type="text" id="mobile"></div>
            <div class="form-group"><label>ঠিকানা</label><input type="text" id="address"></div>
            <div class="form-group">
                <label>ক্লাস</label>
                <select id="class">
                    <option>প্লে</option><option>নার্সারি</option><option>১ম</option><option>২য়</option>
                    <option>৩য়</option><option>৪র্থ</option><option>৫ম</option><option>৬ষ্ঠ</option><option>হিফয</option>
                </select>
            </div>
            <div class="form-group"><label><input type="checkbox" id="residential"> আবাসিক</label></div>
            <div class="form-group"><label>পিতার এনআইডি</label><input type="text" id="father_nid"></div>
            <div class="form-group"><label>জন্ম নিবন্ধন</label><input type="text" id="birth_reg"></div>
            <div class="form-group"><label>হিসাব শুরুর মাস</label><input type="month" id="start_month" required></div>
            <div class="modal-footer">
                <button type="button" class="btn" onclick="closeModal()">বাতিল</button>
                <button type="submit" class="btn">সংরক্ষণ</button>
            </div>
        </form>
    </div>
</div>

<script>
    lucide.createIcons();
    let allStudents = [];

    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    function toggleTheme() {
        const h = document.documentElement;
        const c = h.getAttribute('data-theme');
        const n = c === 'dark' ? 'light' : 'dark';
        h.setAttribute('data-theme', n);
        localStorage.setItem('theme', n);
        document.getElementById('theme-icon').setAttribute('data-lucide', n === 'dark' ? 'moon' : 'sun');
        lucide.createIcons();
    }

    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('theme-icon').setAttribute('data-lucide', saved === 'dark' ? 'moon' : 'sun');
    lucide.createIcons();

    async function loadStudents() {
        const r = await fetch('/api/students');
        allStudents = await r.json();
        renderStudents(allStudents);
    }

    function renderStudents(list) {
        const tbody = document.getElementById('studentList');
        tbody.innerHTML = '';
        list.forEach(s => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = s.id;
            row.insertCell(1).innerText = s.name;
            row.insertCell(2).innerText = s.father || '';
            row.insertCell(3).innerText = s.mobile || '';
            row.insertCell(4).innerText = s.class;
            row.insertCell(5).innerText = s.residential ? 'হ্যাঁ' : 'না';
            row.insertCell(6).innerText = s.start_month || '';
            row.insertCell(7).innerHTML = `
                <button class="btn btn-small" onclick="editStudent('${s.id}')"><i data-lucide="edit-2"></i></button>
                <button class="btn btn-small" style="background:var(--success)" onclick="window.location.href='profile.html?id=${s.id}'"><i data-lucide="user"></i></button>
                <button class="btn btn-small btn-danger" onclick="deleteStudent('${s.id}')"><i data-lucide="trash-2"></i></button>
            `;
        });
        lucide.createIcons();
    }

    function filterStudents() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = allStudents.filter(s => s.name.toLowerCase().includes(q) || s.id.includes(q));
        renderStudents(filtered);
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'নতুন ছাত্র';
        document.getElementById('studentForm').reset();
        document.getElementById('studentId').value = '';
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    async function editStudent(id) {
        const r = await fetch(`/api/student/${id}`);
        const s = await r.json();
        document.getElementById('modalTitle').innerText = 'ছাত্র সম্পাদন';
        document.getElementById('studentId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('father').value = s.father || '';
        document.getElementById('mobile').value = s.mobile || '';
        document.getElementById('address').value = s.address || '';
        document.getElementById('class').value = s.class;
        document.getElementById('residential').checked = s.residential == 1;
        document.getElementById('father_nid').value = s.father_nid || '';
        document.getElementById('birth_reg').value = s.birth_reg || '';
        document.getElementById('start_month').value = s.start_month || '';
        document.getElementById('modal').classList.add('active');
    }

    async function deleteStudent(id) {
        if (confirm('ডিলিট করলে তথ্য নিষ্ক্রিয় হবে। চালিয়ে যাবেন?')) {
            await fetch(`/api/delete_student/${id}`, { method: 'DELETE' });
            loadStudents();
        }
    }

    document.getElementById('studentForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('studentId').value;
        const payload = {
            name: document.getElementById('name').value,
            father: document.getElementById('father').value,
            mobile: document.getElementById('mobile').value,
            address: document.getElementById('address').value,
            class: document.getElementById('class').value,
            residential: document.getElementById('residential').checked ? 1 : 0,
            father_nid: document.getElementById('father_nid').value,
            birth_reg: document.getElementById('birth_reg').value,
            start_month: document.getElementById('start_month').value
        };
        const url = id ? `/api/update_student/${id}` : '/api/add_student';
        await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        closeModal();
        loadStudents();
    };

    loadStudents();
</script>
</body>
</html>
