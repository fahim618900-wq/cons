<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ড্যাশবোর্ড - মাদরাসা অ্যাকাউন্টিং</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --bg-sidebar-hover: #1e293b;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-sidebar: #e2e8f0;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --radius-card: 16px;
            --radius-element: 10px;
            --transition: all 0.2s ease;
        }
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-sidebar: #020617;
            --bg-sidebar-hover: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            font-size: 14px;
            line-height: 1.4;
        }
        /* ----- ছোট ও মার্জিত টপবার ----- */
        .topbar {
            position: sticky; top: 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 998;
            backdrop-filter: blur(8px);
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .menu-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }
        .menu-btn:hover { background: var(--bg-primary); }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 700;
            font-size: 1rem;
        }
        .logo i { width: 18px; height: 18px; }
        .topbar-right { display: flex; gap: 0.5rem; }
        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        .icon-btn:hover { background: var(--bg-primary); color: var(--text-primary); }
        /* ----- সাইডবার (সাইজ ছোট কিন্তু ফাংশনাল) ----- */
        .sidebar {
            position: fixed; top: 0; left: -260px;
            width: 250px;
            height: 100dvh;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            transition: 0.2s;
            padding: 1rem 0;
            z-index: 999;
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 0 1rem 1rem; border-bottom: 1px solid #1e293b; margin-bottom: 0.75rem; }
        .sidebar-nav { padding: 0 0.5rem; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.6rem 0.8rem;
            color: var(--text-sidebar);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 0.2rem;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.85rem;
        }
        .nav-item i { width: 18px; height: 18px; }
        .nav-item:hover { background: var(--bg-sidebar-hover); color: white; }
        .nav-item.active { background: var(--accent); color: white; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            display: none;
            z-index: 998;
        }
        .overlay.active { display: block; }
        /* ----- কন্টেন্ট (কম্প্যাক্ট, মার্জিত) ----- */
        .content {
            padding: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        /* স্ট্যাটস গ্রিড - ছোট কার্ড */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        /* মোবাইলে 2 কলাম, ট্যাবলেট/ডেস্কটপে 4 কলাম */
        @media (min-width: 640px) {
            .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        }
        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-card);
            border: 1px solid var(--border);
            padding: 0.85rem;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .stat-card i {
            color: var(--accent);
            width: 22px;
            height: 22px;
            margin-bottom: 0.4rem;
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .current-due-number {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--danger);
        }
        .stat-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }
        .detail-link {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            margin-top: 0.6rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
        }
        /* কার্ড লিস্ট */
        .card {
            background: var(--bg-secondary);
            border-radius: var(--radius-card);
            border: 1px solid var(--border);
            padding: 1rem;
            box-shadow: var(--shadow);
        }
        .card h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }
        .card h3 i { width: 18px; height: 18px; }
        .due-list { margin-top: 0; }
        .due-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }
        .due-item:last-child { border-bottom: none; }
        .due-item:hover { background: var(--bg-primary); padding-left: 0.3rem; }
        .due-item strong { font-size: 0.9rem; }
        .due-item small { font-size: 0.7rem; color: var(--text-secondary); }
        .empty-state {
            text-align: center;
            padding: 1.2rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        /* রেস্পন্সিভ সাইডবার টগল */
        @media (min-width: 1024px) {
            .sidebar { left: 0; }
            .menu-btn { display: none; }
            .overlay { display: none !important; }
            .content { margin-left: 250px; }
            .topbar { margin-left: 250px; }
        }
        @media (max-width: 480px) {
            .content { padding: 0.75rem; }
            .stat-number { font-size: 1.2rem; }
            .current-due-number { font-size: 1.3rem; }
            .stat-card { padding: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="menu-btn" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
        <div class="logo"><i data-lucide="graduation-cap"></i><span>মাদরাসা ERP</span></div>
    </div>
    <div class="topbar-right">
        <button class="icon-btn" onclick="toggleTheme()"><i data-lucide="sun" id="theme-icon"></i></button>
        <button class="icon-btn" onclick="window.location.href='login.html'"><i data-lucide="log-out"></i></button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo"><i data-lucide="graduation-cap"></i><span>মাদরাসা ERP</span></div>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active"><i data-lucide="layout-dashboard"></i><span>ড্যাশবোর্ড</span></a>
        <a href="students.html" class="nav-item"><i data-lucide="users"></i><span>ছাত্র তালিকা</span></a>
        <a href="payment.html" class="nav-item"><i data-lucide="wallet"></i><span>পেমেন্ট</span></a>
        <a href="due_list.html" class="nav-item"><i data-lucide="alert-circle"></i><span>বকেয়া ছাত্র</span></a>
        <a href="expenses.html" class="nav-item"><i data-lucide="receipt"></i><span>খরচ</span></a>
        <a href="reports.html" class="nav-item"><i data-lucide="bar-chart-2"></i><span>রিপোর্ট</span></a>
        <a href="inactive_students.html" class="nav-item"><i data-lucide="archive"></i><span>নিষ্ক্রিয় ছাত্র</span></a>
        <a href="settings.html" class="nav-item"><i data-lucide="settings"></i><span>সেটিংস</span></a>
    </nav>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="content">
    <div class="stats-grid">
        <div class="stat-card">
            <i data-lucide="users"></i>
            <div class="stat-number" id="totalStudents">0</div>
            <div class="stat-label">মোট ছাত্র</div>
        </div>
        <div class="stat-card">
            <i data-lucide="credit-card"></i>
            <div class="stat-number" id="totalCollected">0</div>
            <div class="stat-label">মোট আদায় (টাকা)</div>
        </div>
        <div class="stat-card">
            <i data-lucide="alert-circle"></i>
            <div class="stat-number" id="totalDue">0</div>
            <div class="stat-label">মোট বকেয়া (টাকা)</div>
        </div>
        <div class="stat-card">
            <i data-lucide="calendar"></i>
            <div class="current-due-number" id="currentMonthDue">0</div>
            <div class="stat-label" id="currentMonthLabel">চলতি মাসের বকেয়া</div>
            <a href="#" id="currentMonthDetailLink" class="detail-link">বিস্তারিত →</a>
        </div>
    </div>

    <div class="card">
        <h3><i data-lucide="list"></i> বকেয়া ছাত্রদের তালিকা</h3>
        <div id="dueStudentsList" class="due-list"></div>
    </div>
</div>

<script>
    lucide.createIcons();
    let currentMonthStr = "";

    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        const icon = document.getElementById('theme-icon');
        icon.setAttribute('data-lucide', newTheme === 'dark' ? 'moon' : 'sun');
        lucide.createIcons();
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-icon').setAttribute('data-lucide', savedTheme === 'dark' ? 'moon' : 'sun');
    lucide.createIcons();

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            if (window.innerWidth < 1024) toggleMenu();
        });
    });

    function formatMonthYear(ym) {
        if (!ym) return '';
        const [year, month] = ym.split('-');
        const date = new Date(parseInt(year), parseInt(month)-1, 1);
        return date.toLocaleString('default', { month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadDashboard() {
        try {
            const res = await fetch('/api/dashboard_stats');
            const data = await res.json();

            document.getElementById('totalStudents').innerText = data.total_students || 0;
            document.getElementById('totalCollected').innerText = data.total_collected || 0;
            document.getElementById('totalDue').innerText = data.total_due || 0;
            
            const currentDue = data.current_month_due || 0;
            document.getElementById('currentMonthDue').innerText = currentDue;
            
            if (data.current_month) {
                currentMonthStr = data.current_month;
                document.getElementById('currentMonthLabel').innerHTML = `${formatMonthYear(data.current_month)} এর বকেয়া`;
                const detailLink = document.getElementById('currentMonthDetailLink');
                detailLink.href = `due_list.html?month=${data.current_month}`;
            }

            const dueListDiv = document.getElementById('dueStudentsList');
            dueListDiv.innerHTML = '';
            if (data.due_students && data.due_students.length > 0) {
                data.due_students.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'due-item';
                    div.innerHTML = `
                        <div>
                            <strong>${escapeHtml(s.name)}</strong> (${escapeHtml(s.id)})<br>
                            <small>${s.class ? escapeHtml(s.class) : ''}</small>
                        </div>
                        <div style="color: var(--danger); font-weight: 600;">${s.due_amount} ৳</div>
                    `;
                    div.onclick = () => window.location.href = `profile.html?id=${s.id}`;
                    dueListDiv.appendChild(div);
                });
            } else {
                dueListDiv.innerHTML = '<div class="empty-state">✨ কোনো বকেয়া ছাত্র নেই</div>';
            }
        } catch (err) {
            console.error('Dashboard load error:', err);
            document.getElementById('dueStudentsList').innerHTML = '<div class="empty-state">লোড করতে সমস্যা হয়েছে</div>';
        }
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
</script>
</body>
</html>
